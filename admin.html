<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Panel</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:6px;
}

input,textarea,select{
width:100%;
padding:8px;
margin:5px 0;
}

button{
background:#0b7a3e;
color:white;
border:none;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>Admin - Upload Audio</h2>

<div class="box">

Jina la Audio
<input id="title">

Maelezo
<textarea id="desc"></textarea>

Category
<select id="category">

<option>Darsa za Ramadhani</option>
<option>Khutbah za Ijumaa</option>
<option>Khutbah za Eid</option>
<option>Darsa za Jumamosi</option>

</select>

Audio File
<input type="file" id="file">

<button onclick="upload()">Upload Audio</button>

</div>

<div class="box">

<h3>Ratiba ya Swala</h3>

Fajr Adhana
<input id="fajrA">

Fajr Iqama
<input id="fajrI">

Dhuhr Adhana
<input id="dhuhrA">

Dhuhr Iqama
<input id="dhuhrI">

Asr Adhana
<input id="asrA">

Asr Iqama
<input id="asrI">

Maghrib Adhana
<input id="maghribA">

Maghrib Iqama
<input id="maghribI">

Isha Adhana
<input id="ishaA">

Isha Iqama
<input id="ishaI">

<button onclick="saveRatiba()">Save Ratiba</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {

apiKey:"AIzaSyBrgOtZN04zoRlpDzOgHFlK_5HvJW6pxD0",
authDomain:"masjidshabaab.firebaseapp.com",
databaseURL:"https://masjidshabaab-default-rtdb.firebaseio.com/",
projectId:"masjidshabaab"

};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

function upload(){

const title=document.getElementById("title").value;
const desc=document.getElementById("desc").value;
const category=document.getElementById("category").value;

const file=document.getElementById("file").files[0];

const reader=new FileReader();

reader.onload=function(){

db.ref("audios").push({

title:title,
desc:desc,
category:category,
url:reader.result

});

alert("Audio Uploaded");

}

reader.readAsDataURL(file);

}

function saveRatiba(){

db.ref("ratiba").set({

fajrA:document.getElementById("fajrA").value,
fajrI:document.getElementById("fajrI").value,

dhuhrA:document.getElementById("dhuhrA").value,
dhuhrI:document.getElementById("dhuhrI").value,

asrA:document.getElementById("asrA").value,
asrI:document.getElementById("asrI").value,

maghribA:document.getElementById("maghribA").value,
maghribI:document.getElementById("maghribI").value,

ishaA:document.getElementById("ishaA").value,
ishaI:document.getElementById("ishaI").value

});

alert("Ratiba saved");

}

</script>

</body>
</html>
